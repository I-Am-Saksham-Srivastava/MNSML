name: codegen
description: Code generator for MNSML that adds support for annotating your code with @observable, @computed, @action and also creating Store classes.
version: 1.0.0
publish_to: none

topics:
  - reactive-programming
  - state-management
  - codegen

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  analyzer: ^9.0.0
  build: ">=3.0.0 < 5.0.0"
  meta: ^1.3.0
  mnsml:
    path: ../../
  path: ^1.8.0
  source_gen: ^4.2.2

dev_dependencies:
  build_runner: ^2.6.0
  build_test: ^3.3.0
  coverage: ^1.8.0
  lints: ^5.0.0
  logging: ^1.0.2
  mocktail: ^1.0.0
  test: ^1.20.1
  dart_style: ^3.1.0
